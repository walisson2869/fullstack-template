basePath: /
definitions:
  handlers.FirebaseToken:
    properties:
      claims:
        additionalProperties: {}
        type: object
      email:
        type: string
      name:
        type: string
      photoUrl:
        type: string
      uid:
        type: string
    type: object
  handlers.HealthStats:
    properties:
      error:
        type: string
      idle:
        type: integer
      in_use:
        type: integer
      max_idle_closed:
        type: integer
      max_lifetime_closed:
        type: integer
      message:
        type: string
      open_connections:
        type: integer
      status:
        type: string
      wait_count:
        type: integer
      wait_duration:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Fullstack template REST API.
  title: Blueprint API
  version: "1.0"
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Hello World
      tags:
      - general
  /admin/queues:
    get:
      produces:
      - text/html
      responses:
        "200":
          description: Asynqmon UI
          schema:
            type: string
      summary: Asynq job monitoring UI
      tags:
      - observability
  /api/v1/me:
    get:
      description: 'Returns the authenticated Firebase user''s decoded claims. Requires
        Authorization: Bearer <firebase-id-token>.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FirebaseToken'
        "401":
          description: Missing or invalid token
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthStats'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.HealthStats'
      summary: Health check
      tags:
      - ops
  /metrics:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: Prometheus exposition format
          schema:
            type: string
      summary: Prometheus metrics
      tags:
      - observability
  /ws:
    get:
      description: Upgrades HTTP to WebSocket. Pass a Firebase ID token as `?token=<token>`.
        Returns 401 when the token is missing or invalid.
      parameters:
      - description: Firebase ID token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Open a WebSocket connection
      tags:
      - websocket
securityDefinitions:
  BearerAuth:
    description: Firebase ID token — prefix with "Bearer "
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
